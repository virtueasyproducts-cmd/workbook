<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The VA Blueprint — 30 Days to Your First High-Ticket Client</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF1F7A;
    --pink-light: #FF6BAB;
    --pink-pale: #FFF0F6;
    --black: #0A0A0A;
    --charcoal: #1C1C1C;
    --white: #FFFFFF;
    --gray: #6B6B6B;
    --gray-light: #F5F5F5;
    --dot-size: 1.5px;
    --dot-space: 22px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background-color: var(--white);
    color: var(--black);
    min-height: 100vh;
    background-image: radial-gradient(rgba(255,107,171,0.18) var(--dot-size), transparent var(--dot-size));
    background-size: var(--dot-space) var(--dot-space);
  }
  .page { max-width: 780px; margin: 0 auto; padding: 48px 32px 80px; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 36px; animation: fadeDown 0.5s ease both; }
  .logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.15rem; letter-spacing: -0.02em; color: var(--black); text-decoration: none; cursor: pointer; }
  .logo span { color: var(--pink); }
  .progress-pill { background: var(--black); color: var(--white); font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 14px; border-radius: 100px; }

  .hero { background: var(--black); border-radius: 20px; padding: 48px 44px; margin-bottom: 28px; position: relative; overflow: hidden; animation: fadeUp 0.6s ease 0.1s both; }
  .hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 220px; height: 220px; background: var(--pink); border-radius: 50%; opacity: 0.18; filter: blur(40px); }
  .hero::after { content: ''; position: absolute; bottom: -40px; left: 30px; width: 140px; height: 140px; background: var(--pink); border-radius: 50%; opacity: 0.1; filter: blur(30px); }
  .day-label { display: inline-block; background: var(--pink); color: var(--white); font-size: 0.7rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; padding: 5px 12px; border-radius: 100px; margin-bottom: 18px; }
  .hero h1 { font-family: 'Playfair Display', serif; font-weight: 900; font-size: clamp(1.7rem, 4vw, 2.5rem); line-height: 1.15; color: var(--white); margin-bottom: 14px; position: relative; z-index: 1; }
  .hero h1 em { font-style: italic; color: var(--pink-light); }
  .hero p { color: rgba(255,255,255,0.65); font-size: 0.95rem; line-height: 1.65; max-width: 520px; position: relative; z-index: 1; }
  .focus-banner { background: var(--pink); border-radius: 14px; padding: 20px 28px; margin-bottom: 28px; display: flex; align-items: center; gap: 16px; animation: fadeUp 0.6s ease 0.2s both; }
  .focus-icon { font-size: 1.6rem; flex-shrink: 0; }
  .focus-banner strong { display: block; color: var(--white); font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 3px; opacity: 0.8; }
  .focus-banner p { color: var(--white); font-weight: 500; font-size: 1rem; line-height: 1.4; }
  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; animation: fadeUp 0.6s ease 0.3s both; }
  .card { background: var(--white); border: 1.5px solid rgba(0,0,0,0.09); border-radius: 16px; padding: 24px 22px; position: relative; transition: border-color 0.2s, box-shadow 0.2s; }
  .card:hover { border-color: var(--pink); box-shadow: 0 4px 24px rgba(255,31,122,0.1); }
  .card-number { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 2.2rem; color: var(--pink); line-height: 1; margin-bottom: 6px; opacity: 0.25; position: absolute; top: 18px; right: 20px; }
  .card h3 { font-size: 0.78rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); margin-bottom: 10px; }
  .card p { font-size: 0.92rem; line-height: 1.6; color: var(--charcoal); }
  .action-section { background: var(--gray-light); border-radius: 16px; padding: 28px 28px 24px; margin-bottom: 28px; animation: fadeUp 0.6s ease 0.35s both; }
  .section-eyebrow { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; color: var(--pink); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .section-eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--pink); opacity: 0.25; }
  .action-section h2 { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.25rem; margin-bottom: 18px; color: var(--black); }
  .task-list { list-style: none; }
  .task-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.07); cursor: pointer; }
  .task-item:last-child { border-bottom: none; }
  .task-check { width: 22px; height: 22px; border: 2px solid #D1D1D1; border-radius: 6px; flex-shrink: 0; margin-top: 1px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; background: var(--white); }
  .task-item.done .task-check { background: var(--pink); border-color: var(--pink); }
  .task-item.done .task-check::after { content: '✓'; color: white; font-size: 0.75rem; font-weight: 700; }
  .task-item.done .task-text { text-decoration: line-through; opacity: 0.45; }
  .task-text { font-size: 0.93rem; line-height: 1.5; color: var(--charcoal); transition: opacity 0.2s; }
  .task-tag { display: inline-block; background: var(--pink-pale); color: var(--pink); font-size: 0.65rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 8px; border-radius: 100px; margin-left: 8px; vertical-align: middle; }
  .journal-section { background: var(--white); border: 1.5px solid rgba(0,0,0,0.09); border-radius: 16px; padding: 26px 26px 22px; margin-bottom: 28px; animation: fadeUp 0.6s ease 0.4s both; }
  .journal-section h2 { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.2rem; margin-bottom: 6px; color: var(--black); }
  .journal-section .subtitle { font-size: 0.85rem; color: var(--gray); margin-bottom: 18px; }
  .journal-prompt { background: var(--pink-pale); border-left: 3px solid var(--pink); padding: 14px 16px; border-radius: 0 10px 10px 0; margin-bottom: 14px; font-size: 0.9rem; font-style: italic; color: var(--charcoal); line-height: 1.55; }
  textarea { width: 100%; min-height: 110px; border: 1.5px solid rgba(0,0,0,0.1); border-radius: 10px; padding: 14px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--charcoal); resize: vertical; outline: none; transition: border-color 0.2s; background: var(--gray-light); }
  textarea:focus { border-color: var(--pink); background: var(--white); }
  textarea::placeholder { color: #ABABAB; }
  .affirmation { background: var(--black); border-radius: 14px; padding: 22px 26px; display: flex; align-items: center; gap: 14px; margin-bottom: 36px; animation: fadeUp 0.6s ease 0.45s both; }
  .affirmation-icon { font-size: 1.4rem; flex-shrink: 0; }
  .affirmation p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1rem; color: var(--white); line-height: 1.5; }
  .affirmation p span { color: var(--pink-light); }
  .nav-buttons { display: flex; justify-content: space-between; align-items: center; animation: fadeUp 0.6s ease 0.5s both; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 13px 24px; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none; }
  .btn-primary { background: var(--pink); color: var(--white); }
  .btn-primary:hover { background: #e0156a; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,31,122,0.3); }
  .btn-ghost { background: transparent; color: var(--gray); border: 1.5px solid rgba(0,0,0,0.12); }
  .btn-ghost:hover:not(:disabled) { border-color: var(--black); color: var(--black); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .day-counter { font-size: 0.8rem; color: var(--gray); font-weight: 500; }
  .save-notice { text-align: center; font-size: 0.75rem; color: var(--gray); margin-top: 18px; animation: fadeUp 0.5s ease 0.55s both; }
  .save-notice a { color: var(--pink); text-decoration: none; font-weight: 500; cursor: pointer; }

  /* DAY SELECTOR (home screen) */
  .home-screen { animation: fadeUp 0.5s ease both; }
  .home-hero { background: var(--black); border-radius: 20px; padding: 52px 44px; margin-bottom: 32px; position: relative; overflow: hidden; text-align: center; }
  .home-hero::before { content: ''; position: absolute; top: -80px; right: -80px; width: 300px; height: 300px; background: var(--pink); border-radius: 50%; opacity: 0.15; filter: blur(60px); }
  .home-hero::after { content: ''; position: absolute; bottom: -60px; left: -40px; width: 200px; height: 200px; background: var(--pink); border-radius: 50%; opacity: 0.1; filter: blur(40px); }
  .home-hero h1 { font-family: 'Playfair Display', serif; font-weight: 900; font-size: clamp(2rem, 5vw, 3rem); color: var(--white); line-height: 1.15; margin-bottom: 14px; position: relative; z-index: 1; }
  .home-hero h1 em { font-style: italic; color: var(--pink-light); }
  .home-hero p { color: rgba(255,255,255,0.6); font-size: 1rem; line-height: 1.65; position: relative; z-index: 1; max-width: 480px; margin: 0 auto; }
  .week-label { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; color: var(--pink); margin: 28px 0 12px; display: flex; align-items: center; gap: 8px; }
  .week-label::after { content: ''; flex: 1; height: 1px; background: var(--pink); opacity: 0.25; }
  .days-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 6px; }
  .day-btn { background: var(--white); border: 1.5px solid rgba(0,0,0,0.09); border-radius: 12px; padding: 14px 8px; text-align: center; cursor: pointer; transition: all 0.18s; font-family: 'DM Sans', sans-serif; }
  .day-btn:hover { border-color: var(--pink); box-shadow: 0 3px 14px rgba(255,31,122,0.12); transform: translateY(-2px); }
  .day-btn.completed { border-color: var(--pink); background: var(--pink-pale); }
  .day-btn .dn { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.3rem; color: var(--pink); line-height: 1; }
  .day-btn .dt { font-size: 0.65rem; color: var(--gray); margin-top: 4px; line-height: 1.3; }
  .day-btn.completed .dn::after { content: ' ✓'; font-size: 0.9rem; }
  .overall-progress { background: var(--gray-light); border-radius: 14px; padding: 20px 24px; margin-top: 24px; }
  .overall-progress h3 { font-size: 0.8rem; font-weight: 500; color: var(--gray); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
  .big-progress { display: flex; align-items: center; gap: 16px; }
  .big-progress-bar { flex: 1; height: 8px; background: rgba(0,0,0,0.08); border-radius: 100px; overflow: hidden; }
  .big-progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink), var(--pink-light)); border-radius: 100px; transition: width 0.6s ease; }
  .big-progress-pct { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.1rem; color: var(--pink); white-space: nowrap; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 580px) { .page { padding: 28px 16px 60px; } .hero { padding: 30px 22px; } .home-hero { padding: 36px 24px; } .card-grid { grid-template-columns: 1fr; } .days-grid { grid-template-columns: repeat(3, 1fr); } }
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <a class="logo" onclick="showHome()">virtue<span>easy</span></a>
    <div class="progress-pill" id="topPill">The VA Blueprint</div>
  </div>

  <div id="homeScreen"></div>
  <div id="dayScreen" style="display:none;"></div>
</div>

<script>
const DAYS = [
  {
    title: "Get Brutally Clear on Who You Serve",
    titleEm: "Who You Serve",
    focus: "Define your ideal high-ticket client avatar — the one person you'd work with forever.",
    focusIcon: "🎯",
    time: "15 min",
    win: "You'll finish today knowing exactly who your offer is built for. That clarity is worth thousands.",
    tasks: [
      { text: "Write down 3 industries you already have experience or interest in", tag: "10 min" },
      { text: "For each industry, name one type of business owner inside it (ex: \"solo real estate agent\")", tag: "5 min" },
      { text: "Pick your top ONE. Don't overthink it — you can always pivot. Commit for now.", tag: "2 min" },
      { text: "Fill in the sentence: \"I help [niche] do [result] so they can [bigger outcome].\"", tag: "Bonus" }
    ],
    prompt: "Who is the one person I want to wake up excited to serve? What do they struggle with that I can genuinely solve?",
    affirmation: "\"The riches are in the niches. <span>The right one client beats ten wrong ones, every time.</span>\""
  },
  {
    title: "Identify the Problem Worth Paying For",
    titleEm: "Problem Worth Paying For",
    focus: "High-ticket clients pay for solved problems, not tasks. Find the pain that has a price tag.",
    focusIcon: "💡",
    time: "20 min",
    win: "A clearly articulated problem statement you can paste directly into your bio or pitch.",
    tasks: [
      { text: "List 5 problems your niche faces that cost them time or money every week", tag: "10 min" },
      { text: "Circle the one problem that, if solved, would make them say \"take my money\"", tag: "5 min" },
      { text: "Write out that problem in the client's own language — emotional, specific, real", tag: "5 min" },
      { text: "Google 3 competitors in your niche and note how they describe the problem they solve", tag: "Research" }
    ],
    prompt: "What keeps my ideal client up at 2am that I could actually fix? What's the cost to them if they don't solve it?",
    affirmation: "\"Clients don't pay for your time. <span>They pay for the transformation your time creates.</span>\""
  },
  {
    title: "Build Your Offer Around an Outcome",
    titleEm: "an Outcome",
    focus: "Stop selling tasks. Start selling results. Today you draft the core of your high-ticket offer.",
    focusIcon: "📦",
    time: "25 min",
    win: "A one-sentence offer statement you could say out loud without stumbling.",
    tasks: [
      { text: "Write down everything you could do for a client (braindump — no filter)", tag: "10 min" },
      { text: "Highlight the 3-5 tasks that directly connect to your niche's biggest problem", tag: "5 min" },
      { text: "Draft your offer: \"I help [niche] achieve [result] in [timeframe] through [service]\"", tag: "10 min" },
      { text: "Read it out loud. Does it sound like something a busy CEO would pay for?", tag: "Check" }

    prompt: "If a client paid me $1,500/month, what would they need to feel it was absolutely worth it? What would their life or business look like at the end?",

  {
    title: "Price It Like You Mean It",

    focus: "Most VAs undercharge by 40-60%. Today you do the math and set a number you can say without flinching.",
    focusIcon: "💰",
    time: "20 min",
    win: "A monthly retainer price you're confident in — and the math to back it up.",
    tasks: [
      { text: "Calculate your minimum: monthly expenses + profit goal ÷ client slots", tag: "Math" },
      { text: "Research what 3 established VAs in your niche charge (check their websites, LinkedIn)", tag: "Research" },
      { text: "Set your starting price. It should feel slightly uncomfortable — that's the point.", tag: "10 min" },
      { text: "Practice saying your price out loud 5 times without adding \"...is that okay?\"", tag: "Practice" }

  },
  {
    title: "Create a LinkedIn Profile That Converts",
    titleEm: "That Converts",
    focus: "Your LinkedIn is your storefront. Most VA profiles look like a resume. Yours will look like an offer.",
    focusIcon: "🔗",
    time: "30 min",
    win: "A fully updated LinkedIn headline and About section that speak directly to your niche.",

      { text: "Send 5 connection requests to people in your target niche with a personal note", tag: "Outreach" }

  {

  {

    focus: "You don't need a huge audience. You need the right 10 people to see the right post. Let's create it.",

    time: "30 min",
    win: "One piece of content published today that speaks directly to your niche's pain point.",
    tasks: [

let currentDay = null;

function getCompletedDays() {
  return JSON.parse(localStorage.getItem('va_completed_days') || '[]');
}

function markDayComplete(dayIndex) {
  const completed = getCompletedDays();
  if (!completed.includes(dayIndex)) {
    completed.push(dayIndex);
    localStorage.setItem('va_completed_days', JSON.stringify(completed));
  }
}

function isDayComplete(dayIndex) {
  return getCompletedDays().includes(dayIndex);
}

function showHome() {
  currentDay = null;
  document.getElementById('topPill').textContent = 'The VA Blueprint';
  document.getElementById('homeScreen').style.display = '';
  document.getElementById('dayScreen').style.display = 'none';
  renderHome();
  window.scrollTo(0, 0);
}

function renderHome() {
  const completed = getCompletedDays();
  const pct = Math.round((completed.length / 30) * 100);

  const weeks = [
    { label: "Week 1 — Foundation", days: [0,1,2,3,4,5,6] },
    { label: "Week 2 — Systems & Outreach", days: [7,8,9,10,11,12,13] },
    { label: "Week 3 — Presence & Proof", days: [14,15,16,17,18,19,20] },
    { label: "Week 4 — Close & Deliver", days: [21,22,23,24,25,26,27,28,29] }
  ];

  const shortTitles = DAYS.map(d => {
    const words = d.title.split(' ');
    return words.slice(0, 3).join(' ') + (words.length > 3 ? '…' : '');
  });

  let html = `
    <div class="home-screen">
      <div class="home-hero">
        <h1>30 Days to Your<br><em>First High-Ticket Client</em></h1>
        <p>A day-by-day action plan for virtual assistants ready to stop trading hours for dollars.</p>
      </div>
      <div class="overall-progress">
        <h3>Overall Progress</h3>
        <div class="big-progress">
          <div class="big-progress-bar"><div class="big-progress-fill" style="width:${pct}%"></div></div>
          <div class="big-progress-pct">${completed.length}/30 days</div>
        </div>
      </div>
  `;

  weeks.forEach(week => {
    html += `<div class="week-label">${week.label}</div><div class="days-grid">`;
    week.days.forEach(i => {
      const done = completed.includes(i);
      html += `
        <div class="day-btn ${done ? 'completed' : ''}" onclick="showDay(${i})">
          <div class="dn">Day ${i+1}${done ? ' ✓' : ''}</div>
          <div class="dt">${shortTitles[i]}</div>
        </div>`;
    });
    html += `</div>`;
  });

  html += `</div>`;
  document.getElementById('homeScreen').innerHTML = html;
}

function showDay(index) {
  currentDay = index;
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('dayScreen').style.display = '';
  document.getElementById('topPill').textContent = `Day ${index + 1} of 30`;
  renderDay(index);
  window.scrollTo(0, 0);
}

function renderDay(index) {
  const d = DAYS[index];
  const storageKey = `va_day${index}`;
  const savedTasks = JSON.parse(localStorage.getItem(`${storageKey}_tasks`) || '[]');
  const savedJournal = localStorage.getItem(`${storageKey}_journal`) || '';
  const doneCount = savedTasks.filter(Boolean).length;
  const total = d.tasks.length;
  const progressPct = ((index + 1) / 30) * 100;
  const heroTitle = d.titleEm ? d.title.replace(d.titleEm, '<em>' + d.titleEm + '</em>') : d.title;

  let tasksHtml = d.tasks.map((t, i) => `
    <li class="task-item ${savedTasks[i] ? 'done' : ''}" onclick="toggleTask(this, ${index}, ${i})">
      <div class="task-check"></div>
      <div class="task-text">${t.text} <span class="task-tag">${t.tag}</span></div>
    </li>`).join('');

  const isFirst = index === 0;
  const isLast = index === 29;

  document.getElementById('dayScreen').innerHTML = `
    <div style="animation: fadeDown 0.4s ease both;">
      <button class="btn btn-ghost" onclick="showHome()" style="margin-bottom:28px; font-size:0.82rem;">← All Days</button>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-label"><span>Your Progress</span><span>Day ${index+1} of 30</span></div>
      <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${progressPct}%"></div></div>
    </div>
    <div class="hero">
      <div class="day-label">Day ${index+1} of 30</div>
      <h1>${heroTitle}</h1>
      <p>${d.focus}</p>
    </div>
    <div class="focus-banner">
      <div class="focus-icon">${d.focusIcon}</div>
      <div>
        <strong>Today's Focus</strong>
        <p>${d.focus}</p>
      </div>
    </div>
    <div class="card-grid">
      <div class="card">
        <div class="card-number">${d.time.replace(' min','').replace(' hr','')}</div>
        <h3>Time Required</h3>
        <p>${d.time} of focused work. Progress over perfection.</p>
      </div>
      <div class="card">
        <div class="card-number">1</div>
        <h3>Big Win Today</h3>
        <p>${d.win}</p>
      </div>
    </div>
    <div class="action-section">
      <div class="section-eyebrow">Today's Tasks</div>
      <h2>Do These ${total} Things</h2>
      <ul class="task-list" id="taskList">${tasksHtml}</ul>
    </div>
    <div class="journal-section">
      <div class="section-eyebrow">Reflection</div>
      <h2>Your Daily Journal</h2>
      <p class="subtitle">Takes 2 minutes. Skipping this is skipping results.</p>
      <div class="journal-prompt">${d.prompt}</div>
      <textarea id="journalEntry" placeholder="Write your answer here. No judgment, no editing — just think out loud..." oninput="saveJournal(${index})">${savedJournal}</textarea>
    </div>
    <div class="affirmation">
      <div class="affirmation-icon">✨</div>
      <p>${d.affirmation}</p>
    </div>
    <div class="nav-buttons">
      <button class="btn btn-ghost" onclick="${isFirst ? 'showHome()' : `showDay(${index-1})`}">← ${isFirst ? 'Home' : `Day ${index}`}</button>
      <span class="day-counter" id="taskCounter">${doneCount} / ${total} tasks done</span>
      <button class="btn btn-primary" onclick="${isLast ? 'showHome()' : `showDay(${index+1})`}">${isLast ? '🎉 Finish' : `Day ${index+2} →`}</button>
    </div>
    <p class="save-notice">Your notes auto-save in this browser. <a onclick="downloadNotes(${index})">Download Day ${index+1} notes</a></p>
  `;
}

function toggleTask(item, dayIndex, taskIndex) {
  item.classList.toggle('done');
  const storageKey = `va_day${dayIndex}_tasks`;
  const items = document.querySelectorAll('#taskList .task-item');
  const states = [...items].map(t => t.classList.contains('done'));
  localStorage.setItem(storageKey, JSON.stringify(states));
  const doneCount = states.filter(Boolean).length;
  document.getElementById('taskCounter').textContent = `${doneCount} / ${states.length} tasks done`;
  if (doneCount === states.length) markDayComplete(dayIndex);
}

function saveJournal(dayIndex) {
  localStorage.setItem(`va_day${dayIndex}_journal`, document.getElementById('journalEntry').value);
}

function downloadNotes(dayIndex) {
  const d = DAYS[dayIndex];
  const tasks = [...document.querySelectorAll('#taskList .task-item')].map(t => {
    const done = t.classList.contains('done') ? '[x]' : '[ ]';
    return `${done} ${t.querySelector('.task-text').textContent.trim()}`;
  }).join('\n');
  const journal = document.getElementById('journalEntry').value || '(no notes written yet)';
  const content = `THE VA BLUEPRINT — Day ${dayIndex+1} Notes\n${'='.repeat(44)}\n\nDAY TITLE: ${d.title}\n\nTASKS:\n${tasks}\n\nJOURNAL PROMPT:\n${d.prompt}\n\nMY ANSWER:\n${journal}\n\nDate saved: ${new Date().toLocaleDateString()}`;
  const blob = new Blob([content], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `VA-Blueprint-Day${dayIndex+1}-Notes.txt`;
  a.click();
}

// Init
showHome();
</script>
</body>
</html>
