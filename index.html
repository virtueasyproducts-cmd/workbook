<style>

  .big-progress { display: flex; align-items: center; gap: 16px; }
  .big-progress-bar { flex: 1; height: 8px; background: rgba(0,0,0,0.08); border-radius: 100px; overflow: hidden; }
  .big-progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink), var(--pink-light)); border-radius: 100px; transition: width 0.6s ease; }
  .big-progress-pct { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.1rem; color: var(--pink); white-space: nowrap; }
  .bonus-section { background: var(--black); border-radius: 20px; padding: 28px 32px; margin-top: 28px; display: flex; align-items: center; gap: 20px; position: relative; overflow: hidden; }
  .bonus-section::before { content: ''; position: absolute; top: -40px; right: -40px; width: 180px; height: 180px; background: var(--pink); border-radius: 50%; opacity: 0.15; filter: blur(40px); }
  .bonus-badge { background: var(--pink); color: var(--white); font-size: 0.68rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 12px; border-radius: 100px; white-space: nowrap; flex-shrink: 0; align-self: flex-start; margin-top: 4px; }
  .bonus-section h3 { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.1rem; color: var(--white); margin-bottom: 6px; position: relative; z-index: 1; }
  .bonus-section p { color: rgba(255,255,255,0.6); font-size: 0.88rem; line-height: 1.55; margin-bottom: 14px; position: relative; z-index: 1; }
  .bonus-body { position: relative; z-index: 1; }
  .tab-nav { display: flex; gap: 8px; }
  .tab-btn { font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500; padding: 7px 16px; border-radius: 100px; border: none; cursor: pointer; transition: all 0.2s; }
  .tab-black { background: var(--black); color: var(--white); }
  .tab-black:hover { background: var(--charcoal); }
  .tab-black.tab-inactive { background: transparent; color: var(--gray); border: 1.5px solid rgba(0,0,0,0.12); }
  .tab-pink { background: var(--pink); color: var(--white); }
  .tab-pink:hover { background: #e0156a; }
  .tab-pink.tab-inactive { background: transparent; color: var(--pink); border: 1.5px solid rgba(255,31,122,0.35); }
  .pipeline-cta { display: flex; align-items: center; justify-content: space-between; background: var(--pink-pale); border: 1.5px solid rgba(255,31,122,0.2); border-radius: 14px; padding: 16px 20px; margin-bottom: 28px; gap: 14px; animation: fadeUp 0.6s ease 0.38s both; }
  .pipeline-cta-text { font-size: 0.88rem; color: var(--charcoal); line-height: 1.45; }
  .pipeline-cta-text strong { color: var(--pink); display: block; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }
  .btn-pipeline { background: var(--pink); color: var(--white); padding: 9px 18px; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; border: none; cursor: pointer; white-space: nowrap; transition: all 0.2s; flex-shrink: 0; }
  .btn-pipeline:hover { background: #e0156a; transform: translateY(-1px); }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 580px) {
    .page { padding: 24px 16px 60px; }
    .hero { padding: 30px 22px; }
    .home-hero { padding: 36px 24px; }
    .card-grid { grid-template-columns: 1fr; }
    .days-grid { grid-template-columns: repeat(3, 1fr); }
    .bonus-section { flex-direction: column; gap: 14px; }
    .tracker-stats { grid-template-columns: repeat(2, 1fr); }
    .ai-row { grid-template-columns: 1fr; }
    .ai-actions { grid-template-columns: 1fr 1fr; }
    .ai-variants { grid-template-columns: 1fr; }
    .nav-buttons { justify-content: center; }
  }

<script>
const PROXY_URL = 'https://workbook-theta.vercel.app/api/generate';
const DAYS = [
  { title:"Get Brutally Clear on Who You Serve", titleEm:"Who You Serve", focus:"Define your ideal high-ticket client avatar — the one person you'd work with forever.", focusIcon:"🎯", proTip:"Most VAs pick a niche that feels safe instead of one they're genuinely excited about. Clients can feel the difference. Enthusiasm is a competitive advantage you can't fake — and don't have to.", time:"15", win:"You'll finish today knowing exactly who your offer is built for. That clarity is worth thousands.", tasks:[{text:"Write down 3 industries you already have experience or interest in",tag:"10 min"},{text:"For each industry, name one type of business owner inside it (ex: \"solo real estate agent\")",tag:"5 min"},{text:"Pick your top ONE. Don't overthink it — you can always pivot. Commit for now.",tag:"2 min"},{text:"Fill in the sentence: \"I help [niche] do [result] so they can [bigger outcome].\"",tag:"Bonus"}], prompt:"Who is the one person I want to wake up excited to serve? What do they struggle with that I can genuinely solve?", affirmation:"\"The riches are in the niches. <span>The right one client beats ten wrong ones, every time.</span>\"" },
  { title:"Identify the Problem Worth Paying For", titleEm:"Problem Worth Paying For", focus:"High-ticket clients pay for solved problems, not tasks. Find the pain that has a price tag.", focusIcon:"💡", proTip:"The problem worth the most money is almost never the surface problem. Dig one layer deeper: a coach doesn't need 'inbox management' — they need to stop losing $5k clients because follow-up emails fall through the cracks. Sell the deeper fix.", time:"20", win:"A clearly articulated problem statement you can paste directly into your bio or pitch.", tasks:[{text:"List 5 problems your niche faces that cost them time or money every week",tag:"10 min"},{text:"Circle the one problem that, if solved, would make them say \"take my money\"",tag:"5 min"},{text:"Write out that problem in the client's own language — emotional, specific, real",tag:"5 min"},{text:"Google 3 competitors in your niche and note how they describe the problem they solve",tag:"Research"}], prompt:"What keeps my ideal client up at 2am that I could actually fix? What's the cost to them if they don't solve it?", affirmation:"\"Clients don't pay for your time. <span>They pay for the transformation your time creates.</span>\"" },
  { title:"Build Your Offer Around an Outcome", titleEm:"an Outcome", focus:"Stop selling tasks. Start selling results. Today you draft the core of your high-ticket offer.", focusIcon:"📦", proTip:"The fastest way to position yourself as premium is to name your offer. Not 'VA services' — something specific like 'The CEO Support System' or 'Launch Ops Package.' A named offer signals expertise. A job description signals commodity.", time:"25", win:"A one-sentence offer statement you could say out loud without stumbling.", tasks:[{text:"Write down everything you could do for a client (braindump — no filter)",tag:"10 min"},{text:"Highlight the 3-5 tasks that directly connect to your niche's biggest problem",tag:"5 min"},{text:"Draft your offer: \"I help [niche] achieve [result] in [timeframe] through [service]\"",tag:"10 min"},{text:"Read it out loud. Does it sound like something a busy CEO would pay for?",tag:"Check"}], prompt:"If a client paid me $1,500/month, what would they need to feel it was absolutely worth it? What would their life or business look like at the end?", affirmation:"\"You are not a task-doer. <span>You are a problem-solver. Price accordingly.</span>\"" },
  { title:"Price It Like You Mean It", titleEm:"Like You Mean It", focus:"Most VAs undercharge by 40-60%. Today you do the math and set a number you can say without flinching.", focusIcon:"💰", proTip:"When you raise your prices, you don't lose clients — you filter them. Lower prices attract clients who nickel-and-dime and drain your energy. Higher prices attract clients who trust your expertise, respect your time, and refer their friends.", time:"20", win:"A monthly retainer price you're confident in — and the math to back it up.", tasks:[{text:"Calculate your minimum: monthly expenses + profit goal ÷ client slots",tag:"Math"},{text:"Research what 3 established VAs in your niche charge (check their websites, LinkedIn)",tag:"Research"},{text:"Set your starting price. It should feel slightly uncomfortable — that's the point.",tag:"10 min"},{text:"Practice saying your price out loud 5 times without adding \"...is that okay?\"",tag:"Practice"}], prompt:"What would I charge if I fully believed in the value I deliver? What's the story I tell myself that keeps me charging less?", affirmation:"\"Charging what you're worth isn't arrogance. <span>Undercharging is just fear wearing a discount tag.</span>\"" },
  { title:"Create a LinkedIn Profile That Converts", titleEm:"That Converts", focus:"Your LinkedIn is your storefront. Most VA profiles look like a resume. Yours will look like an offer.", focusIcon:"🔗", proTip:"Your LinkedIn headline is the most valuable real estate you own online. It shows up in search results, DM previews, and comment sections. 'Virtual Assistant | Helping [niche] [result]' outperforms 'Experienced VA | Available for hire' every single time — because one sells an outcome, the other sells availability.", time:"30", win:"A fully updated LinkedIn headline and About section that speak directly to your niche.", tasks:[{text:"Rewrite your headline: [Who you help] + [What result you create] — no job titles",tag:"10 min"},{text:"Update your About section: open with their problem, not your background",tag:"15 min"},{text:"Add your featured section with a link, a case study, or a strong post",tag:"5 min"},{text:"Send 5 connection requests to people in your target niche with a personal note",tag:"Outreach"}], prompt:"If my ideal client landed on my LinkedIn right now, would they immediately know I can solve their problem? What's the first thing they'd see?", affirmation:"\"Your profile isn't your resume. <span>It's your pitch. Write it like someone's reading it right now — because they are.</span>\"" },
  { title:"Build a Simple Portfolio (Even Without Clients)", titleEm:"Even Without Clients", focus:"No testimonials yet? No problem. Today you build social proof from scratch — the right way.", focusIcon:"📁", proTip:"Spec work beats no work every time. Pick a real business in your niche — someone you admire or follow — and do a sample project for them without being asked. Audit their inbox system. Rewrite their onboarding email. It shows initiative that paid samples never can.", time:"30", win:"At least one portfolio piece you're proud to share with a prospect.", tasks:[{text:"Create a \"spec work\" sample — do the work you'd do for a client, just for a fictional one",tag:"20 min"},{text:"Write a short case study around it: situation, what you did, result (estimated is fine)",tag:"10 min"},{text:"Upload it to a Google Drive folder or Notion page and get the shareable link",tag:"5 min"},{text:"Save this link — you'll use it in outreach next week",tag:"Save"}], prompt:"What would I create if I had total creative freedom to show off exactly what I'm capable of? What would make a prospect say \"wow\"?", affirmation:"\"No one starts with a portfolio. <span>They start with the decision to build one.</span>\"" },
  { title:"Write Your First Cold DM", titleEm:"Cold DM", focus:"Most cold outreach fails because it's about the sender. Yours will be about the recipient.", focusIcon:"✉️", proTip:"The #1 reason cold DMs get ignored isn't the pitch — it's that they're clearly copy-pasted. One specific detail about their business is worth more than a perfectly crafted opening line. Mention a recent post, a podcast they were on, or something specific you noticed. That detail tells them: you actually looked.", time:"20", win:"One cold DM template you can send today — and actually feel good about.", tasks:[{text:"Study 3 bad cold DMs you've received. Write down what made them annoying.",tag:"Research"},{text:"Write a DM that leads with a specific observation about their business",tag:"10 min"},{text:"Keep it under 5 sentences. End with a soft CTA, not a hard sell.",tag:"Edit"},{text:"Send it to at least 3 people in your target niche today",tag:"Send it"}], prompt:"If I received this DM, would I reply? What would make me actually want to respond to a stranger reaching out?", affirmation:"\"The best cold outreach doesn't feel cold. <span>It feels like someone actually paid attention.</span>\"",
    aiGenerator:{ type:"dm", title:"AI cold DM generator", subtitle:"Fill in the details below and get a personalised script in seconds.", fields:[{id:"niche",label:"Your niche",placeholder:"e.g. fitness coaches",type:"input"},{id:"pain",label:"Their biggest pain",placeholder:"e.g. no time for admin",type:"input"},{id:"platform",label:"Platform",type:"select",options:["Instagram","LinkedIn","Facebook","Twitter / X"]},{id:"tone",label:"Tone",type:"select",options:["Warm & direct","Casual & friendly","Professional","Bold & confident"]},{id:"observation",label:"One specific thing you noticed about them",placeholder:"e.g. They post Reels constantly but their bio link goes nowhere",type:"textarea"}],
    buildPrompt:(v)=>`Write a cold outreach DM for a virtual assistant reaching out to a ${v.niche} on ${v.platform}. Their biggest pain: ${v.pain}. ${v.observation?'Specific observation: '+v.observation+'.':''} Tone: ${v.tone}. Under 90 words. Open with the specific observation or a genuine compliment. Mention you help ${v.niche} with ${v.pain}. End with ONE soft question, not a hard pitch. No generic openers. Sound human. Use [Name] as placeholder. Return ONLY the DM text, nothing else.`,
    nudge:{text:"Sent your DM? Log it in your tracker.",sub:"Head to Day 13 to set up your follow-up system so no lead falls through."} }
  },
  { title:"Set Up Your Simple Systems", titleEm:"Simple Systems", focus:"High-ticket clients expect professionalism. Today you set up the backend that makes you look like a legit business.", focusIcon:"⚙️", proTip:"Send a welcome email within 24 hours of every new client signing — before you've even started the work. Most VAs wait until they have something to show. But that first email sets the tone for everything. It says: I am organised, I am excited, and I run a real business.", time:"30", win:"A functional onboarding system you could use to sign your first client tomorrow.", tasks:[{text:"Create a simple contract template (use HelloSign free tier or Google Docs)",tag:"10 min"},{text:"Set up a Calendly or TidyCal link for discovery calls with your availability",tag:"10 min"},{text:"Create a simple invoice template in Wave (free) or a Google Sheet",tag:"5 min"},{text:"Draft a welcome email you'll send to every new client the day they sign",tag:"5 min"}], prompt:"What would a client's first 72 hours working with me feel like? Have I made it easy for them to say yes and get started?", affirmation:"\"Systems aren't sexy. <span>But they're what separate the booked-out VA from the one still chasing invoices.</span>\"" },
  { title:"Find Where Your Clients Actually Are", titleEm:"Actually Are", focus:"Stop posting into the void. Today you identify the exact platforms and communities where your ideal clients hang out.", focusIcon:"📍", proTip:"The fastest path to your first client isn't posting more — it's showing up where your ideal client already complains. Find the Facebook groups or LinkedIn comments where they vent. Read. Listen. Then show up with answers. You'll stand out because most people only show up to sell.", time:"20", win:"A list of 10 specific places (groups, hashtags, events, platforms) your niche lives in.", tasks:[{text:"Search Facebook Groups for your niche — join 3 that are active and full of prospects",tag:"10 min"},{text:"Find 3 LinkedIn hashtags your niche posts under and follow them",tag:"5 min"},{text:"Identify 2 podcasts your ideal client listens to — note the host names for future outreach",tag:"5 min"},{text:"Write down where your niche complains, brags, and asks questions online",tag:"Research"}], prompt:"Where does my ideal client go when they're frustrated? When they're celebrating? When they need help? Am I showing up in those spaces?", affirmation:"\"You don't need to be everywhere. <span>You need to be exactly where your client already is.</span>\"" },
  { title:"Create Content That Attracts Clients", titleEm:"That Attracts Clients", focus:"You don't need a huge audience. You need the right 10 people to see the right post. Let's create it.", focusIcon:"📝", proTip:"The posts that get VAs hired are never the ones that say 'I'm available for clients.' They're the ones that demonstrate expertise — a behind-the-scenes of a system you built, a mistake you see businesses make, a result you helped someone get. Show the work. Let the offer be implied.", time:"30", win:"One piece of content published today that speaks directly to your niche's pain point.", tasks:[{text:"Write a post that starts with a bold statement about your niche's biggest problem",tag:"15 min"},{text:"Include a specific insight, tip, or perspective — not generic advice",tag:"Edit"},{text:"End with a soft CTA: a question, a DM invite, or a comment prompt",tag:"5 min"},{text:"Post it on LinkedIn AND the Facebook groups you joined yesterday",tag:"Publish"}], prompt:"What's one thing I know about my niche that most people get wrong? What would I tell them if they were sitting right across from me?", affirmation:"\"Content doesn't build audiences. <span>It builds trust. One right person reading the right post changes everything.</span>\"" },
  { title:"Master the Discovery Call", titleEm:"Discovery Call", focus:"Discovery calls aren't interviews — they're diagnostic conversations. Today you build your framework.", focusIcon:"📞", proTip:"The most powerful thing you can do on a discovery call is repeat their words back to them. Write down their exact phrasing. Then when you present your offer, use their language — not yours. It makes the solution feel tailor-made, because in that moment, it is.", time:"25", win:"A 5-question discovery call script you can use on your next prospect call.", tasks:[{text:"Write 5 open-ended questions that uncover your prospect's problem and urgency",tag:"15 min"},{text:"Script your opening 90 seconds: who you are, what the call will cover, what they can expect",tag:"5 min"},{text:"Plan your close: how will you present your offer and pricing at the end?",tag:"5 min"},{text:"Practice the full call out loud — record yourself on your phone",tag:"Practice"}], prompt:"What questions, if answered, would tell me everything I need to know about whether this person is the right client? What would a great discovery call feel like?", affirmation:"\"The best closer isn't the best talker. <span>They're the best listener.</span>\"",
    aiGenerator:{ type:"discovery", title:"AI discovery call question generator", subtitle:"Get a customised set of diagnostic questions for your specific niche.", fields:[{id:"niche",label:"Your niche",placeholder:"e.g. online course creators",type:"input"},{id:"pain",label:"Their main pain point",placeholder:"e.g. overwhelmed with launch admin",type:"input"},{id:"goal",label:"Outcome you help them achieve",placeholder:"e.g. a stress-free launch",type:"input"}],
    buildPrompt:(v)=>`Write 5 open-ended discovery call questions for a virtual assistant speaking with a ${v.niche}. The prospect's main pain: ${v.pain}. The VA helps them achieve: ${v.goal}. Questions should uncover urgency, budget readiness, past attempts, and decision-making process. Make them feel like a trusted advisor, not a job interview. Return ONLY the 5 numbered questions, nothing else.`,
    nudge:{text:"Save these questions before your next call.",sub:"Come back to Day 22 to run through your full pre-call prep checklist."} }
  },
  { title:"Handle Objections Before They Happen", titleEm:"Before They Happen", focus:"\"I need to think about it\" is code for something. Today you learn to decode it — and respond with confidence.", focusIcon:"🛡️", proTip:"The objection you fear most is the one you're least prepared for — and prospects sense that hesitation. Rehearse your responses until they feel natural, not defensive. The goal isn't to win an argument. It's to help someone who wants to say yes find a reason to.", time:"20", win:"A written response to the 3 most common objections in your niche.", tasks:[{text:"List the top 3 objections you expect: price, timing, \"I'll do it myself\"",tag:"5 min"},{text:"For each one, write a response that acknowledges, reframes, and redirects — not defends",tag:"15 min"},{text:"Role-play each objection with a friend, partner, or yourself in the mirror",tag:"Practice"},{text:"Save your responses where you can reference them before every call",tag:"Save"}], prompt:"What am I most afraid someone will say on a call? Why does that feel threatening — and what's the truth underneath my fear?", affirmation:"\"An objection is not a rejection. <span>It's a question wearing a trench coat.</span>\"" },
  { title:"Send 10 Outreach Messages", titleEm:"10 Outreach Messages", focus:"Today is a doing day. No more prep. Just ship. Ten messages go out before you close your laptop.", focusIcon:"🚀", proTip:"Personalisation doesn't have to take 20 minutes per message. Keep your template, swap the first sentence to include one specific detail about them. That single change moves your reply rate from 2% to 15-25%. One sentence. Massive difference.", time:"45", win:"10 messages sent. That's it. Ship the work.", tasks:[{text:"Identify 10 prospects from your niche communities (LinkedIn, Facebook Groups, Instagram)",tag:"15 min"},{text:"Personalize your DM for each — one specific detail per message",tag:"20 min"},{text:"Send all 10. No second-guessing, no tweaking after the fact.",tag:"Send"},{text:"Log every message sent in your tracker — name, platform, date",tag:"Track"}], prompt:"What's the story I tell myself when I hesitate to reach out? What would happen if I just sent the message anyway?", affirmation:"\"You miss 100% of the messages you don't send. <span>Ten outreach attempts today beats a perfect strategy you never execute.</span>\"" },
  { title:"Follow Up Like a Pro", titleEm:"Like a Pro", focus:"80% of sales happen after the 5th follow-up. Most VAs stop after one. Today you build your follow-up system.", focusIcon:"🔄", proTip:"The best follow-up message isn't a nudge — it's a value drop. Share something genuinely useful: a resource, an insight, a relevant article. You're not reminding them you exist. You're proving it was a good idea to talk to you. Every follow-up is a second first impression.", time:"20", win:"A 3-touch follow-up sequence written and ready to use.", tasks:[{text:"Write Follow-Up #1: send 3 days after first message — add value, not pressure",tag:"7 min"},{text:"Write Follow-Up #2: send 7 days later — share a relevant piece of content or insight",tag:"7 min"},{text:"Write Follow-Up #3: the \"breakup\" message — send 14 days later, close the loop gracefully",tag:"6 min"},{text:"Add follow-up reminders in your calendar for every prospect you messaged yesterday",tag:"Schedule"}], prompt:"Why do I avoid following up? Is it fear of rejection — or fear of actually getting a yes and having to deliver?", affirmation:"\"The fortune is in the follow-up. <span>Most people don't ignore your message. They just forget. Remind them.</span>\"" },
  { title:"Ask for Testimonials Strategically", titleEm:"Strategically", focus:"Social proof is a shortcut to trust. Today you learn how to ask for it — and what to do with it when you get it.", focusIcon:"⭐", proTip:"Don't ask for a testimonial. Ask for a story. 'Can you share what working together has been like?' produces something 10x more compelling than 'Can you leave me a review?' Stories are specific, emotional, and believable. Reviews sound like reviews.", time:"20", win:"A testimonial request you could send today, and a plan for where it goes once you get it.", tasks:[{text:"Identify 3 people who could give you a testimonial: past clients, colleagues, spec work reviewers",tag:"5 min"},{text:"Write a testimonial request that makes it EASY to respond — include guiding questions",tag:"10 min"},{text:"Send at least one request today",tag:"Send"},{text:"Decide where you'll display testimonials: website, LinkedIn, PDF portfolio, social posts",tag:"Plan"}], prompt:"Who has seen my work and been impressed by it? What would they say about me if I asked — and why haven't I asked yet?", affirmation:"\"People trust people. <span>One real testimonial is worth ten polished marketing claims.</span>\"" },
  { title:"Build a Referral Engine", titleEm:"Referral Engine", focus:"The easiest client to close is a warm referral. Today you plant the seeds intentionally.", focusIcon:"🌱", proTip:"The biggest mistake VAs make with referrals is waiting until they need them. Ask during the honeymoon period — when a client has just seen your first big win, when excitement is at its peak. That's when they're most likely to think of someone and actually tell them. Timing is everything.", time:"20", win:"A simple referral ask you can send to 5 people in your network this week.", tasks:[{text:"List 10 people in your network who know your work or could vouch for you",tag:"10 min"},{text:"Write a friendly, non-pushy referral ask — not a pitch, just a \"know anyone?\" note",tag:"7 min"},{text:"Decide on a simple referral incentive if relevant (gift card, commission, free month)",tag:"3 min"},{text:"Send referral asks to 3 people today",tag:"Send"}], prompt:"Who in my life knows what I do and genuinely believes in me? Have I ever actually told them I'm looking for clients — in clear, direct terms?", affirmation:"\"Warm referrals aren't luck. <span>They're what happens when you do great work and then actually ask.</span>\"" },
  { title:"Build a Simple Website (or Fix the One You Have)", titleEm:"Simple Website", focus:"One page. Three sections. Clear CTA. That's all you need. Let's build it.", focusIcon:"🌐", proTip:"Your website has one job: get someone to book a call or send a message. Every element on the page should serve that goal or be removed. A beautiful website with no clear CTA converts worse than an ugly one with a single obvious button. Clarity always beats design.", time:"45", win:"A live, shareable website link you're not embarrassed to send to a prospect.", tasks:[{text:"Choose your platform: Carrd ($19/yr), Notion + Super, or Squarespace (free trial)",tag:"5 min"},{text:"Write your hero section: headline, one-liner, and one CTA button only",tag:"15 min"},{text:"Add a services section with your offer, deliverables, and price (or \"starting at\")",tag:"15 min"},{text:"Add a contact section and link your Calendly — then publish and test the link",tag:"10 min"}], prompt:"If a prospect visited my website right now, what action would I want them to take? Have I made that action blindingly obvious?", affirmation:"\"A perfect website you never publish helps no one. <span>A simple one that's live closes clients.</span>\"" },
  { title:"Create a Signature Service Package", titleEm:"Signature Service Package", focus:"\"I do a little bit of everything\" is a red flag for high-ticket buyers. Today you create one clear, named package.", focusIcon:"🎁", proTip:"Name your package something that speaks to the transformation, not the tasks. 'The Visibility System' for a social media VA. 'The Inbox Zero Protocol' for an email manager. 'The Launch Ops Package' for a course VA. A named, outcome-focused package justifies premium pricing in a way that 'monthly retainer' never will.", time:"30", win:"A named, priced, deliverable-specific package you can describe in 30 seconds.", tasks:[{text:"Choose a name for your package — something specific, not \"VA Package\" or \"Monthly Retainer\"",tag:"5 min"},{text:"List exactly what's included: specific deliverables, response times, communication channels",tag:"15 min"},{text:"Write the outcome: what will the client's business look like after working with you?",tag:"5 min"},{text:"Set your price and write the one-paragraph pitch for this package",tag:"5 min"}], prompt:"If I could only offer one service to one type of person, what would it be — and why would that person pay a premium for it?", affirmation:"\"Clarity converts. <span>The more specific your offer, the easier it is for the right person to say yes.</span>\"" },
  { title:"Audit Your Online Presence", titleEm:"Online Presence", focus:"Before you send another message, make sure your digital footprint is working for you — not against you.", focusIcon:"🔍", proTip:"Google yourself right now from an incognito window. That's what your prospects see. Most VAs are shocked by what comes up. Old social profiles, inconsistent bios, a photo from three years ago. Fix what you find before you send another outreach message. First impressions happen before the conversation starts.", time:"25", win:"A clean, consistent online presence across every platform you use for business.", tasks:[{text:"Google your name. What comes up? Would a prospect be impressed or confused?",tag:"5 min"},{text:"Audit every profile: photo, bio, link, and pinned content — are they all aligned?",tag:"10 min"},{text:"Delete, archive, or update anything that doesn't reflect who you are now",tag:"5 min"},{text:"Make sure your niche and offer are visible within the first 3 seconds of every profile",tag:"Check"}], prompt:"If someone I wanted to impress googled me tonight, what would they find? Is that the story I want to tell?", affirmation:"\"Your online presence is working 24/7 — whether you're optimizing it or not. <span>Make it work for you.</span>\"" },
  { title:"Batch Your Content for the Week", titleEm:"Batch Your Content", focus:"Consistent content beats perfect content. Today you create a week's worth in one sitting.", focusIcon:"📅", proTip:"The best time to write content is right after a client interaction — when the insight is fresh and the language is real. Keep a running note on your phone of every question a client asks, every problem you solve, every aha moment you have. That note is your content calendar. Mine it every week.", time:"45", win:"5 posts scheduled and ready to publish this week — no daily scrambling.", tasks:[{text:"Brainstorm 5 post ideas that speak to your niche's pain points, wins, or common questions",tag:"10 min"},{text:"Write all 5 posts using your niche voice — honest, specific, zero fluff",tag:"25 min"},{text:"Schedule them using Buffer, Later, or Meta Business Suite (all have free tiers)",tag:"10 min"},{text:"Engage with 10 other posts in your niche before you close the tab — comment genuinely",tag:"Engage"}], prompt:"What are my ideal clients searching for, complaining about, or asking questions about this week? Am I creating content that meets them exactly there?", affirmation:"\"You don't need to go viral. <span>You need to be consistently visible to exactly the right people.</span>\"" },
  { title:"Book Your First Discovery Call", titleEm:"First Discovery Call", focus:"This is the day things get real. Today's entire mission is booking one call. Just one.", focusIcon:"📆", proTip:"The fastest way to book a call isn't a DM — it's a direct, public post that says 'I have 2 discovery call spots open this week for [niche] who want [outcome]. Comment or DM to grab one.' It feels vulnerable. It converts incredibly well. The people who want what you offer are watching. Give them a door to walk through.", time:"All day", win:"One discovery call booked. If you already have one, book a second.", tasks:[{text:"Review your outreach tracker — who responded? Who opened but didn't reply?",tag:"10 min"},{text:"Send a direct, confident call invitation to anyone who's shown any interest",tag:"20 min"},{text:"Post on LinkedIn: \"Opening 2 discovery call spots this week for [niche]\" — actually do it",tag:"Post"},{text:"Text or DM one person in your personal network who knows someone in your niche",tag:"Warm outreach"}], prompt:"What's the worst thing that could realistically happen if I booked a call and it didn't go well? And what's the best thing that could happen if it did?", affirmation:"\"A call is just a conversation. <span>The only way to get good at them is to book them.</span>\"" },
  { title:"Prepare to Show Up Like a Pro on the Call", titleEm:"Show Up Like a Pro", focus:"The call experience starts before you say a word. Today you prep every detail so you can focus on listening.", focusIcon:"💼", proTip:"Before every discovery call, spend 10 minutes on the prospect's most recent social content. Find one thing that tells you what's on their mind right now. Reference it naturally in the first 5 minutes. It shifts the entire dynamic. You're not a vendor. You're someone who pays attention.", time:"30", win:"A complete pre-call checklist you'll use before every single discovery call going forward.", tasks:[{text:"Research your prospect: their business, recent content, struggles they've mentioned publicly",tag:"15 min"},{text:"Prepare your space: good lighting, clean background, water nearby, phone silenced",tag:"5 min"},{text:"Review your discovery call questions and objection responses from Days 11 and 12",tag:"5 min"},{text:"Write one custom question specific to this prospect to ask during the call",tag:"5 min"}], prompt:"What does showing up professionally mean to me — in body language, in preparation, in how I talk about my work? Am I doing that consistently?", affirmation:"\"Preparation isn't perfectionism. <span>It's respect — for your prospect's time and for your own expertise.</span>\"" },
  { title:"Run Your First Discovery Call", titleEm:"First Discovery Call", focus:"The call is today. Or it's happening this week. Your only job: listen more than you talk.", focusIcon:"🎙️", proTip:"If you find yourself talking more than 40% of the time on a discovery call, stop and ask a question. The person who asks the most questions controls the conversation — and the person who feels most heard is most likely to buy. Silence is not awkward on a sales call. It's the other person thinking about saying yes.", time:"60", win:"A completed discovery call and a clear next step communicated to the prospect.", tasks:[{text:"Open with warmth and set the agenda for the next 30-45 minutes",tag:"Opener"},{text:"Ask your 5 diagnostic questions and LISTEN without interrupting or pitching early",tag:"Middle"},{text:"Present your offer only after you understand their problem clearly — connect it to their words",tag:"Offer"},{text:"End with a clear next step: \"I'll send you the proposal by [day]\" — not \"I'll be in touch\"",tag:"Close"}], prompt:"How did the call feel? What did I do well? Where did I rush, over-explain, or undersell? What will I do differently next time?", affirmation:"\"You don't have to be perfect on the call. <span>You just have to be present, curious, and genuinely helpful.</span>\"" },
  { title:"Send a Proposal That Closes", titleEm:"That Closes", focus:"A weak proposal loses clients a strong call already won. Today you build one that seals the deal.", focusIcon:"📄", proTip:"Start your proposal with their problem — in their exact words from the call. Not a summary. Their words. It signals you listened, it reminds them why they got on the call, and it makes everything that follows feel like it was written specifically for them. Because it was.", time:"45", win:"A polished, sent proposal for your discovery call prospect — or a template ready for future use.", tasks:[{text:"Open the proposal with their problem — in their own words from the call",tag:"10 min"},{text:"Present your offer: name, deliverables, timeline, and price. No fluff, no padding.",tag:"15 min"},{text:"Add a short \"why me\" section — specific, not generic. One paragraph.",tag:"10 min"},{text:"Close with a clear CTA and deadline: \"To get started, reply YES by [date].\"",tag:"10 min"}], prompt:"If I were the prospect reading this proposal, what would make me say yes immediately? What would make me hesitate — and have I addressed that?", affirmation:"\"A proposal isn't a document. <span>It's a decision made easy.</span>\"",
    aiGenerator:{ type:"proposal", title:"AI proposal opener generator", subtitle:"Turn your call notes into a powerful opening paragraph that makes the prospect feel heard.", fields:[{id:"niche",label:"Prospect's business type",placeholder:"e.g. online fitness coach",type:"input"},{id:"problem",label:"Their problem in their own words (from your call)",placeholder:"e.g. I'm spending 3hrs a day on emails and missing sales calls",type:"textarea"},{id:"goal",label:"What outcome do they want?",placeholder:"e.g. get their time back and focus on coaching",type:"input"}],
    buildPrompt:(v)=>`Write a powerful opening paragraph for a virtual assistant's proposal to a ${v.niche}. Use the prospect's own words where possible: '${v.problem}'. Their goal: ${v.goal}. Make them feel completely understood, remind them of the cost of inaction, and set up the offer that follows. Warm, confident, specific. 3-4 sentences maximum. Return ONLY the paragraph, nothing else.`,
    nudge:{text:"Paste this directly into the top of your proposal.",sub:"Replace the opening section with this before you send — it makes the whole proposal land differently."} }

  { title:"Handle the Post-Proposal Silence", titleEm:"Post-Proposal Silence", focus:"Silence after a proposal feels personal. It isn't. Today you learn to follow up without desperation.", focusIcon:"⏳", proTip:"The worst follow-up is 'Just checking in.' It communicates nothing except that you're waiting and slightly anxious. The best follow-up adds something: a relevant stat, a quick thought about their business, a resource that ties back to what you discussed. Make every touch a reason to re-engage — not a reminder that they haven't replied.", time:"15", win:"One confident, professional follow-up sent — and a clear timeline for what happens next.", tasks:[{text:"Wait 48 hours after sending the proposal before following up — honor the timeline",tag:"Timing"},{text:"Send a short, warm check-in: \"Just wanted to make sure this landed in your inbox\" + a soft question",tag:"10 min"},{text:"Add a touch of value: a relevant article, stat, or quick insight that ties back to their goal",tag:"5 min"},{text:"Set a hard date in your calendar for when you'll consider this lead closed if no response",tag:"Mindset"}], prompt:"What story am I telling myself in the silence after a proposal? Is it true — or is my brain filling in the worst-case scenario?", affirmation:"\"Silence is not rejection. <span>It's just timing. Follow up with confidence, not apology.</span>\"",
    aiGenerator:{ type:"followup", title:"AI follow-up message generator", subtitle:"Write a follow-up that adds value instead of just chasing a reply.", fields:[{id:"name",label:"Prospect's first name",placeholder:"e.g. Sarah",type:"input"},{id:"niche",label:"Their business",placeholder:"e.g. real estate coach",type:"input"},{id:"goal",label:"Their main goal from your call",placeholder:"e.g. free up 10hrs/week",type:"input"},{id:"days",label:"Days since proposal sent",type:"select",options:["2 days","3-4 days","5-7 days","Over a week"]},{id:"tone",label:"Tone",type:"select",options:["Warm & confident","Direct & brief","Light & friendly"]}],
    buildPrompt:(v)=>`Write a follow-up message for a virtual assistant to send to ${v.name}, a ${v.niche}, ${v.days} after sending a proposal. Their main goal was: ${v.goal}. Tone: ${v.tone}. Do NOT say 'just checking in.' Add one small piece of value — a thought, insight, or resource relevant to their goal. Keep it under 5 sentences. Soft CTA only. Return ONLY the message, nothing else.`,
    nudge:{text:"Send this within 48hrs of your proposal.",sub:"If no reply after 14 days, it's time for the graceful close-out message from Day 13."} }
  },
  { title:"Close the Deal (or Learn from the Loss)", titleEm:"Close the Deal", focus:"A yes gets you a client. A no gets you data. Both are wins when you approach them right.", focusIcon:"🏆", proTip:"When someone says no, ask one question: 'Can I ask what made this a no for now?' Not to change their mind — to learn. The answers will tell you more about your pricing and positioning than any course ever will. VAs who grow fastest treat every lost deal as paid research.", time:"20", win:"Either a signed contract and first invoice sent — or a documented lesson from a lost deal.", tasks:[{text:"If they said YES: send the contract, invoice, and welcome email within 24 hours",tag:"Client won"},{text:"If they said NO: send a gracious reply and ask one question — \"Can I ask what made this a no for now?\"",tag:"Client lost"},{text:"Document the outcome in your tracker: price, objections, what worked, what didn't",tag:"Track"},{text:"Celebrate the attempt regardless of outcome. You did what most people never do.",tag:"Celebrate"}], prompt:"What did I learn from this experience — about my offer, my pitch, my prospect, or myself? How does it make me sharper for the next one?", affirmation:"\"Every no is tuition. <span>Every yes is the return on that investment.</span>\"" },
  { title:"Deliver an Exceptional First Week", titleEm:"Exceptional First Week", focus:"The sale is the beginning, not the end. How you show up in week one determines the testimonial you get in month three.", focusIcon:"🌟", proTip:"Deliver one small, unexpected thing in the first 48 hours — before they expect it. A quick-win task completed, a resource you promised on the call, a process audit they didn't ask for. That early over-deliver sets a tone that compounds. Clients who feel taken care of in week one never leave in month three.", time:"Ongoing", win:"A new client who feels so taken care of they're already thinking about who they can refer you to.", tasks:[{text:"Send a detailed welcome email: what to expect, how to communicate, what you need from them",tag:"Day 1"},{text:"Deliver something small and impressive in the first 48 hours — before they expect it",tag:"Quick win"},{text:"Check in mid-week: a short \"just wanted to share progress\" note with a specific update",tag:"Update"},{text:"Ask at end of week 1: \"Is there anything I can do differently to make this even better?\"",tag:"Feedback"}], prompt:"What would make my client brag about me to their business friends? What would make them feel like they got 10x the value of what they paid?", affirmation:"\"Getting the client is the goal. <span>Keeping them — and earning the referral — is the business.</span>\"" },
  { title:"Build Your Repeat and Referral Machine", titleEm:"Repeat and Referral Machine", focus:"One client is a win. A system that generates clients consistently is a business. Today you build that system.", focusIcon:"⚡", proTip:"The single highest-leverage action in any VA business is asking your happiest client for one referral at the moment of peak satisfaction. Not at the end of the contract. Not in month 6. Right after a big win — when they're celebrating. That's your window. Don't miss it.", time:"30", win:"A documented, repeatable process for getting the next client — without starting from zero.", tasks:[{text:"Document every step that got you this client: what worked, in what order",tag:"15 min"},{text:"Identify the 2-3 actions with the highest ROI — double down on those specifically",tag:"10 min"},{text:"Schedule \"outreach blocks\" in your calendar for next month — 3x per week minimum",tag:"Calendar"},{text:"Ask your new client for a testimonial and one referral — now, while the excitement is fresh",tag:"Ask"}], prompt:"What would getting my second client feel like compared to the first? What do I know now that I didn't know 30 days ago?", affirmation:"\"One client proves you can do it. <span>A system proves you've built something real.</span>\"" },
  { title:"Charge More for Client Number Two", titleEm:"Client Number Two", focus:"You have proof of concept now. That changes your pricing power. Today you set a higher rate for everything that comes next.", focusIcon:"📈", proTip:"You don't need to justify a price increase to a new client. They don't know what you charged before. Your price is your price. The justification trap is something VAs create in their own heads — and it keeps them stuck. New client, new rate. That's it.", time:"20", win:"A revised rate card for your next client — higher than what you charged before, and a clear reason why.", tasks:[{text:"Write down exactly what you delivered this month and what it was worth to your client",tag:"10 min"},{text:"Set your new rate for client #2 — minimum 20% higher than your starting price",tag:"5 min"},{text:"Update your website, proposals, and any rate sheets to reflect the new number",tag:"5 min"},{text:"Write one sentence explaining the rate increase if asked — confident, not apologetic",tag:"Prep"}], prompt:"What's the difference between who I was when I set my original price and who I am right now? Does my pricing reflect that difference yet?", affirmation:"\"Your first client taught you what you're worth. <span>Your second client pays for it.</span>\"" },

let currentDay = null;
let aiGenerations = parseInt(localStorage.getItem('va_ai_gens') || '0');
const AI_MAX = 15;

function getCompletedDays() { return JSON.parse(localStorage.getItem('va_completed_days') || '[]'); }
function markDayComplete(i) { const c = getCompletedDays(); if (!c.includes(i)) { c.push(i); localStorage.setItem('va_completed_days', JSON.stringify(c)); } }
function getProspects() { return JSON.parse(localStorage.getItem('va_prospects') || '[]'); }
function saveProspects(p) { localStorage.setItem('va_prospects', JSON.stringify(p)); }

function setTab(active) {
  document.getElementById('tabCourse').className = active === 'course' ? 'tab-btn tab-black' : 'tab-btn tab-black tab-inactive';
  document.getElementById('tabPipeline').className = active === 'pipeline' ? 'tab-btn tab-pink' : 'tab-btn tab-pink tab-inactive';
}

function showHome() {
  currentDay = null;
  document.getElementById('homeScreen').style.display = '';
  document.getElementById('pipelineScreen').style.display = 'none';
  document.getElementById('dayScreen').style.display = 'none';
  setTab('course');
  renderHome();
  window.scrollTo(0,0);
}

function showPipeline() {
  currentDay = null;
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('pipelineScreen').style.display = '';
  document.getElementById('dayScreen').style.display = 'none';
  setTab('pipeline');
  renderPipeline();
  window.scrollTo(0,0);
}

function renderPipeline() {
  const prospects = getProspects();
  const replied = prospects.filter(p => ['replied','call','won'].includes(p.status)).length;
  const calls = prospects.filter(p => ['call','won'].includes(p.status)).length;
  const won = prospects.filter(p => p.status === 'won').length;
  const weekGoal = 10;
  const weekPct = Math.min(100, Math.round((prospects.length / weekGoal) * 100));
  const nudge = won > 0
    ? {icon:'🎉', text:`You closed ${won} client${won>1?'s':''}! That's real.`, sub:`Go back to Day 27 to make their first week unforgettable.`}
    : calls > 0
    ? {icon:'📞', text:`You have ${calls} call${calls>1?'s':''} booked. Big deal.`, sub:`Head to Day 22 to run through your full pre-call prep checklist.`}
    : replied > 0
    ? {icon:'💬', text:`${replied} prospect${replied>1?'s':''} replied — momentum is building.`, sub:`Time to book those calls. Go back to Day 7 to send your follow-up DM.`}
    : prospects.length > 0
    ? {icon:'🚀', text:`${prospects.length} message${prospects.length>1?'s':''} sent. Keep going.`, sub:`80% of sales happen after the 5th follow-up. Stay consistent.`}
    : null;

  const bmap = {sent:'badge-sent',replied:'badge-replied',call:'badge-call',won:'badge-won'};
  const lmap = {sent:'Sent',replied:'Replied',call:'Call booked',won:'Client won'};

  let rows = '';
  if (prospects.length > 0) {
    [...prospects].reverse().forEach((p, i) => {
      const initials = p.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
      const date = new Date(p.date).toLocaleDateString('en-US',{month:'short',day:'numeric'});
      rows += `<div class="tr-row">
        <div class="tr-avatar">${initials}</div>
        <div style="flex:1;min-width:0;">
          <div class="tr-name">${p.name}</div>
          <div class="tr-detail">${p.platform}${p.niche?' · '+p.niche:''} · ${date}</div>
        </div>
        <select class="status-select ${bmap[p.status]||'badge-sent'}" onchange="updateProspectStatus(${prospects.length-1-i}, this.value)">
          <option value="sent" ${p.status==='sent'?'selected':''}>Sent</option>
          <option value="replied" ${p.status==='replied'?'selected':''}>Replied</option>
          <option value="call" ${p.status==='call'?'selected':''}>Call booked</option>
          <option value="won" ${p.status==='won'?'selected':''}>Client won</option>
        </select>
      </div>`;
    });
  } else {
    rows = `<div class="tr-empty" style="padding:32px 16px;">
      <div style="font-size:2rem;margin-bottom:10px;">📬</div>
      <div style="font-weight:500;color:var(--charcoal);margin-bottom:6px;">No outreach logged yet</div>
      <div style="font-size:0.82rem;">Head to Day 7 to send your first DM, then come back here to track it.</div>
    </div>`;
  }

  document.getElementById('pipelineScreen').innerHTML = `<div style="animation:fadeUp 0.5s ease both;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
      <div>
        <h2 style="font-family:'Playfair Display',serif;font-weight:700;font-size:1.5rem;">Client Pipeline</h2>
        <p style="font-size:0.83rem;color:var(--gray);margin-top:3px;">Manually log every outreach — every message counts.</p>
      </div>
      <button class="tracker-add" onclick="openAddProspect()">+ Log outreach</button>
    </div>
    <div class="tracker-stats" style="margin-bottom:20px;">
      <div class="tr-stat"><div class="tr-stat-num">${prospects.length}</div><div class="tr-stat-label">Messages sent</div></div>
      <div class="tr-stat"><div class="tr-stat-num">${replied}</div><div class="tr-stat-label">Replied</div></div>
      <div class="tr-stat"><div class="tr-stat-num">${calls}</div><div class="tr-stat-label">Calls booked</div></div>
      <div class="tr-stat"><div class="tr-stat-num" style="${won>0?'color:var(--pink)':''}">${won}</div><div class="tr-stat-label">Client won</div></div>
    </div>
    <div class="tr-goal-wrap">
      <div class="tr-goal-top"><span>Weekly outreach goal</span><span>${prospects.length} of ${weekGoal} messages</span></div>
      <div class="tr-goal-bar"><div class="tr-goal-fill" style="width:${weekPct}%"></div></div>
    </div>
    <div class="tr-list" style="margin-bottom:16px;">${rows}</div>
    ${nudge ? `<div class="tr-nudge"><div class="tr-nudge-icon">${nudge.icon}</div><div><div class="tr-nudge-text">${nudge.text}</div><div class="tr-nudge-sub">${nudge.sub}</div></div></div>` : ''}
    <p style="font-size:0.73rem;color:var(--gray);text-align:center;margin-top:20px;">Tip: tap a status badge in the list to update a prospect's stage.</p>
  </div>`;
}

function renderHome() {
  const completed = getCompletedDays();
  const pct = Math.round((completed.length / 30) * 100);
  const prospects = getProspects();
  const replied = prospects.filter(p => ['replied','call','won'].includes(p.status)).length;
  const calls = prospects.filter(p => ['call','won'].includes(p.status)).length;
  const won = prospects.filter(p => p.status === 'won').length;
  const weekGoal = 10;
  const weekPct = Math.min(100, Math.round((prospects.length / weekGoal) * 100));
  const nudge = won > 0
    ? {icon:'🎉', text:`You closed ${won} client${won>1?'s':''}! That's real.`, sub:`Go back to Day 27 to make their first week unforgettable.`}
    : calls > 0
    ? {icon:'📞', text:`You have ${calls} call${calls>1?'s':''} booked. Big deal.`, sub:`Head to Day 22 to run through your full pre-call prep checklist.`}
    : replied > 0
    ? {icon:'💬', text:`${replied} prospect${replied>1?'s':''} replied — momentum is building.`, sub:`Time to book those calls. Go back to Day 7 to send your follow-up DM.`}
    : prospects.length > 0
    ? {icon:'🚀', text:`${prospects.length} message${prospects.length>1?'s':''} sent. Keep going.`, sub:`80% of sales happen after the 5th follow-up. Stay consistent.`}
    : null;

  const weeks = [
    {label:"Week 1 — Foundation", days:[0,1,2,3,4,5,6]},
    {label:"Week 2 — Systems & Outreach", days:[7,8,9,10,11,12,13]},
    {label:"Week 3 — Presence & Proof", days:[14,15,16,17,18,19,20]},
    {label:"Week 4 — Close & Deliver", days:[21,22,23,24,25,26,27,28,29]}
  ];
  const shortTitles = DAYS.map(d => { const w = d.title.split(' '); return w.slice(0,3).join(' ') + (w.length > 3 ? '…' : ''); });

  const pipelineSnippet = won > 0 ? `${won} client won 🎉` : calls > 0 ? `${calls} call${calls>1?'s':''} booked` : replied > 0 ? `${replied} repl${replied>1?'ies':'y'} received` : prospects.length > 0 ? `${prospects.length} message${prospects.length>1?'s':''} sent` : 'No outreach logged yet';

  let html = `<div class="home-screen">
  <div class="home-hero"><h1>30 Days to Your<br><em>First High-Ticket Client</em></h1><p>A day-by-day action plan for virtual assistants ready to stop trading hours for dollars.</p></div>
  <div style="display:flex;align-items:center;justify-content:space-between;background:var(--pink-pale);border:1.5px solid rgba(255,31,122,0.2);border-radius:14px;padding:16px 20px;margin-bottom:28px;gap:14px;flex-wrap:wrap;">
    <div><div style="font-size:0.7rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--pink);margin-bottom:3px;">Client Pipeline</div><div style="font-size:0.88rem;color:var(--charcoal);">${pipelineSnippet}</div></div>
    <button class="btn-pipeline" onclick="showPipeline()">View Pipeline →</button>
  </div>
  <div class="overall-progress" style="margin-top:0;margin-bottom:28px;"><h3>Overall Progress</h3><div class="big-progress"><div class="big-progress-bar"><div class="big-progress-fill" style="width:${pct}%"></div></div><div class="big-progress-pct">${completed.length}/30 days</div></div></div>`;

  weeks.forEach(week => {
    html += `<div class="week-label">${week.label}</div><div class="days-grid">`;
    week.days.forEach(i => {
      const done = completed.includes(i);
      html += `<div class="day-btn ${done?'completed':''}" onclick="showDay(${i})"><div class="dn">Day ${i+1}${done?' ✓':''}</div><div class="dt">${shortTitles[i]}</div></div>`;
    });
    html += `</div>`;
  });

  html += `<div class="bonus-section"><div class="bonus-badge">🎁 Free Bonus</div><div class="bonus-body"><h3>260 ChatGPT Prompts for Virtual Assistants</h3><p>Save hours every week with prompts built for the exact tasks VAs do every day.</p><a href="https://virtueasy.com/260-prompts-download.html" target="_blank" class="btn btn-primary">Access Your Free Bonus →</a></div></div></div>`;
  document.getElementById('homeScreen').innerHTML = html;
}

function updateProspectStatus(index, newStatus) {
  const p = getProspects();
  p[index].status = newStatus;
  saveProspects(p);
  renderPipeline();
}

function openAddProspect() {
  const overlay = document.getElementById('modalOverlay');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.innerHTML = `<div class="modal-box"><div class="modal-title">Log new outreach</div>
    <div class="modal-field"><label>Their name</label><input id="m-name" placeholder="e.g. Sarah Chen" class="ai-input" style="width:100%;"></div>
    <div class="modal-field"><label>Platform</label><select id="m-platform" class="ai-input" style="width:100%;cursor:pointer;"><option>Instagram</option><option>LinkedIn</option><option>Facebook</option><option>Twitter / X</option><option>Email</option><option>Other</option></select></div>
    <div class="modal-field"><label>Their niche (optional)</label><input id="m-niche" placeholder="e.g. fitness coach" class="ai-input" style="width:100%;"></div>
    <div class="modal-field"><label>Status</label><select id="m-status" class="ai-input" style="width:100%;cursor:pointer;"><option value="sent">Sent</option><option value="replied">Replied</option><option value="call">Call booked</option><option value="won">Client won!</option></select></div>
    <div class="modal-actions"><button class="modal-cancel" onclick="closeModal()">Cancel</button><button class="modal-save" onclick="saveProspect()">Save</button></div>
  </div>`;
}

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

function saveProspect() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { document.getElementById('m-name').focus(); return; }
  const p = getProspects();
  p.push({ name, platform: document.getElementById('m-platform').value, niche: document.getElementById('m-niche').value.trim(), status: document.getElementById('m-status').value, date: new Date().toISOString() });
  saveProspects(p);
  closeModal();
  if (document.getElementById('pipelineScreen').style.display !== 'none') {
    renderPipeline();
  } else {
    renderHome();
  }
}

function showDay(index) {
  currentDay = index;
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('dayScreen').style.display = '';
  const topPill = document.getElementById('topPill');
  if (topPill) topPill.textContent = `Day ${index+1} of 30`;
  renderDay(index);
  window.scrollTo(0,0);
}

function renderDay(index) {
  const d = DAYS[index];
  const savedTasks = JSON.parse(localStorage.getItem(`va_day${index}_tasks`) || '[]');
  const savedJournal = localStorage.getItem(`va_day${index}_journal`) || '';
  const doneCount = savedTasks.filter(Boolean).length;
  const total = d.tasks.length;
  const progressPct = ((index+1)/30)*100;
  const heroTitle = d.titleEm ? d.title.replace(d.titleEm, '<em>'+d.titleEm+'</em>') : d.title;
  const isFirst = index === 0, isLast = index === 29;
  const timeDisplay = ['All day','Ongoing','However long it takes'].includes(d.time) ? d.time : d.time+' min';

  const tasksHtml = d.tasks.map((t,i) => `<li class="task-item ${savedTasks[i]?'done':''}" onclick="toggleTask(this,${index},${i})">
    <div class="task-check"><svg viewBox='0 0 13 10' fill='none' xmlns='http://www.w3.org/2000/svg'><path d='M1.5 5L5 8.5L11.5 1.5' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg></div>
    <div class="task-text">${t.text} <span class="task-tag">${t.tag}</span></div>
  </li>`).join('');

  const aiHtml = d.aiGenerator ? renderAIGenerator(d.aiGenerator, index) : '';

  const PIPELINE_DAYS = [6, 11, 12, 19, 23, 24]; // Days 7,12,13,20,24,25 (0-indexed)
  const pipelineCta = PIPELINE_DAYS.includes(index) ? `<div class="pipeline-cta">
    <div class="pipeline-cta-text"><strong>Track it</strong>Log today's outreach in your pipeline so nothing falls through the cracks.</div>
    <button class="btn-pipeline" onclick="showPipeline()">Open Pipeline →</button>
  </div>` : '';

  document.getElementById('dayScreen').innerHTML = `
  <div style="animation:fadeDown 0.4s ease both;"><button class="btn btn-ghost" onclick="showHome()" style="margin-bottom:28px;font-size:0.82rem;">← All Days</button></div>
  <div class="progress-bar-wrap"><div class="progress-bar-label"><span>Your Progress</span><span>Day ${index+1} of 30</span></div><div class="progress-bar-track"><div class="progress-bar-fill" style="width:${progressPct}%"></div></div></div>
  <div class="hero"><div class="day-label">Day ${index+1} of 30</div><h1>${heroTitle}</h1><p>${d.focus}</p></div>
  <div class="pro-tip-banner"><div class="pro-tip-icon">💡</div><div><strong>Pro tip</strong><p>${d.proTip}</p></div></div>
  <div class="card-grid">
    <div class="card"><div class="card-number">${d.time === 'All day' ? '∞' : d.time}</div><h3>Time Required</h3><p>${timeDisplay} of focused work. Progress over perfection.</p></div>
    <div class="card"><div class="card-number">1</div><h3>Big Win Today</h3><p>${d.win}</p></div>
  </div>
  <div class="action-section"><div class="section-eyebrow">Today's Tasks</div><h2>Do These ${total} Things</h2><ul class="task-list" id="taskList">${tasksHtml}</ul></div>
  ${aiHtml}
  <div class="journal-section"><div class="section-eyebrow">Reflection</div><h2>Your Daily Journal</h2><p class="subtitle">Takes 2 minutes. Skipping this is skipping results.</p><div class="journal-prompt">${d.prompt}</div><textarea id="journalEntry" placeholder="Write your answer here. No judgment, no editing — just think out loud..." oninput="saveJournal(${index})">${savedJournal}</textarea></div>
  <div class="affirmation"><div class="affirmation-icon">✨</div><p>${d.affirmation}</p></div>
  ${pipelineCta}
  <div class="nav-buttons">
    <button class="btn btn-ghost" onclick="${isFirst?'showHome()':`showDay(${index-1})`}">← ${isFirst?'Home':`Day ${index}`}</button>
    <span class="day-counter" id="taskCounter">${doneCount} / ${total} tasks done</span>
    <button class="btn btn-primary" onclick="${isLast?'showHome()':`showDay(${index+1})`}">${isLast?'🎉 Finish':`Day ${index+2} →`}</button>
  </div>
  <p class="save-notice">Your notes auto-save in this browser. <a onclick="downloadNotes(${index})">Download Day ${index+1} notes</a></p>`;
}

function renderAIGenerator(gen, dayIndex) {
  const rem = AI_MAX - aiGenerations;
  const dots = Array.from({length:5},(_,i) => `<div class="ai-ldot ${i < Math.ceil(rem/3)?'':'empty'}"></div>`).join('');
  let fieldsHtml = '';
  const rowable = gen.fields.filter(f => f.type !== 'textarea');
  const textareas = gen.fields.filter(f => f.type === 'textarea');
  let i = 0;
  while (i < rowable.length) {
    if (i+1 < rowable.length) { fieldsHtml += `<div class="ai-row">${renderField(rowable[i],dayIndex)}${renderField(rowable[i+1],dayIndex)}</div>`; i+=2; }
    else { fieldsHtml += renderField(rowable[i],dayIndex); i++; }
  }
  textareas.forEach(f => { fieldsHtml += renderField(f,dayIndex); });
  return `<div class="ai-generator">
    <div class="ai-gen-header"><div class="ai-badge"><div class="ai-pulse"></div> AI powered</div></div>
    <div class="ai-gen-title">${gen.title}</div>
    <div class="ai-gen-subtitle">${gen.subtitle}</div>
    ${fieldsHtml}
    <button class="ai-gen-btn" id="aiBtn${dayIndex}" onclick="aiGenerate(${dayIndex})">Generate →</button>
    <div id="aiResult${dayIndex}" style="display:none;">
      <div class="ai-result">
        <div class="ai-result-label">Your personalised script</div>
        <div class="ai-script" id="aiScript${dayIndex}"></div>
        <div class="ai-meta" id="aiMeta${dayIndex}"></div>
        <div class="ai-actions">
          <button class="ai-action-btn" id="aiCopy${dayIndex}" onclick="aiCopy(${dayIndex})">Copy</button>
          <button class="ai-action-btn" onclick="aiGenerate(${dayIndex})">Regenerate</button>
          <button class="ai-action-btn" onclick="aiShorter(${dayIndex})">Make shorter</button>
        </div>
      </div>
      <div class="ai-variants-label">2 more variations</div>
      <div class="ai-variants" id="aiVariants${dayIndex}"></div>
      <div class="ai-nudge" id="aiNudge${dayIndex}" style="display:none;"><div class="ai-nudge-icon">💡</div><div><div class="ai-nudge-text">${gen.nudge.text}</div><div class="ai-nudge-sub">${gen.nudge.sub}</div></div></div>
    </div>
    <div class="ai-limit"><span class="ai-limit-text" id="aiLimitText${dayIndex}">${rem} generation${rem!==1?'s':''} remaining</span><div class="ai-limit-dots" id="aiLimitDots${dayIndex}">${dots}</div></div>
  </div>`;
}

function renderField(f, dayIndex) {
  const id = `ai_${dayIndex}_${f.id}`;
  if (f.type === 'select') return `<div class="ai-field"><label>${f.label}</label><select id="${id}" class="ai-input" style="cursor:pointer;">${f.options.map(o=>`<option>${o}</option>`).join('')}</select></div>`;
  if (f.type === 'textarea') return `<div class="ai-field"><label>${f.label}</label><textarea id="${id}" class="ai-textarea" placeholder="${f.placeholder||''}" rows="3"></textarea></div>`;
  return `<div class="ai-field"><label>${f.label}</label><input id="${id}" class="ai-input" placeholder="${f.placeholder||''}"></div>`;
}

function getFieldValues(gen, dayIndex) {
  const v = {};
  gen.fields.forEach(f => { const el = document.getElementById(`ai_${dayIndex}_${f.id}`); if (el) v[f.id] = el.value.trim(); });
  return v;
}

function updateAILimit(dayIndex) {
  const rem = AI_MAX - aiGenerations;
  const t = document.getElementById(`aiLimitText${dayIndex}`);
  const d = document.getElementById(`aiLimitDots${dayIndex}`);
  if (t) t.textContent = `${rem} generation${rem!==1?'s':''} remaining`;
  if (d) d.innerHTML = Array.from({length:5},(_,i) => `<div class="ai-ldot ${i < Math.ceil(rem/3)?'':'empty'}"></div>`).join('');
}

async function aiGenerate(dayIndex, customPrompt) {
  if (aiGenerations >= AI_MAX) return;
  const d = DAYS[dayIndex];
  const gen = d.aiGenerator;
  const values = getFieldValues(gen, dayIndex);
  if (!values[gen.fields[0].id]) { document.getElementById(`ai_${dayIndex}_${gen.fields[0].id}`).focus(); return; }

  const btn = document.getElementById(`aiBtn${dayIndex}`);
  btn.disabled = true; btn.textContent = 'Generating…';

  const resultEl = document.getElementById(`aiResult${dayIndex}`);
  resultEl.style.display = 'block';
  const scriptEl = document.getElementById(`aiScript${dayIndex}`);
  scriptEl.innerHTML = '<span class="loading-dots"><span>•</span><span>•</span><span>•</span></span>';
  document.getElementById(`aiMeta${dayIndex}`).textContent = '';
  document.getElementById(`aiVariants${dayIndex}`).innerHTML = '';
  document.getElementById(`aiNudge${dayIndex}`).style.display = 'none';

  const prompt = customPrompt || gen.buildPrompt(values);

  try {
    const response = await fetch(PROXY_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({prompt, stream:true}) });
    if (!response.ok) throw new Error('error');
    scriptEl.textContent = '';
    let fullText = '';
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      for (const line of decoder.decode(value).split('\n')) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') break;
          try { const p = JSON.parse(data); if (p.type==='content_block_delta'&&p.delta?.text) { fullText+=p.delta.text; scriptEl.textContent=fullText; } } catch(e) {}
        }
      }
    }
    const wc = fullText.trim().split(/\s+/).filter(Boolean).length;
    document.getElementById(`aiMeta${dayIndex}`).innerHTML = `<span>${wc} words</span><span>reads in ~${Math.round(wc/238*60)}s</span>`;
    localStorage.setItem(`va_ai_script_${dayIndex}`, fullText);
    aiGenerations++; localStorage.setItem('va_ai_gens', aiGenerations);
    updateAILimit(dayIndex);
    aiGenerateVariants(gen, values, dayIndex);
    setTimeout(() => { document.getElementById(`aiNudge${dayIndex}`).style.display = 'flex'; }, 1000);
  } catch(e) {
    scriptEl.textContent = 'Could not connect. Make sure the Vercel proxy URL is configured in the code.';
  }
  btn.disabled = false; btn.textContent = 'Generate →';
}

async function aiShorter(dayIndex) {
  const last = localStorage.getItem(`va_ai_script_${dayIndex}`);
  if (!last) return;
  await aiGenerate(dayIndex, `Shorten this to under 50 words while keeping the key insight and soft question. Return ONLY the shortened text:\n\n${last}`);
}

async function aiGenerateVariants(gen, values, dayIndex) {
  const tones = gen.type==='dm' ? ['More casual','More direct'] : gen.type==='followup' ? ['Warmer & personal','Shorter & direct'] : ['Alternative angle','More concise'];
  const grid = document.getElementById(`aiVariants${dayIndex}`);
  grid.innerHTML = tones.map(t=>`<div class="ai-variant"><div class="ai-variant-tone">${t}</div><div class="ai-variant-preview loading-dots"><span>•</span><span>•</span><span>•</span></div></div>`).join('');
  for (let i = 0; i < tones.length; i++) {
    try {
      const res = await fetch(PROXY_URL, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt: gen.buildPrompt({...values,tone:tones[i]}) + ' Return only the first sentence as a hook preview, nothing else.'})});
      const data = await res.json();
      const text = data.content || '';
      grid.children[i].querySelector('.ai-variant-preview').textContent = text + '…';
      const fp = gen.buildPrompt({...values,tone:tones[i]});
      grid.children[i].onclick = () => aiGenerate(dayIndex, fp);
    } catch(e) { grid.children[i].querySelector('.ai-variant-preview').textContent = 'Could not load.'; }
  }
}

function aiCopy(dayIndex) {
  const text = document.getElementById(`aiScript${dayIndex}`).textContent;
  if (!text || text.includes('•')) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(`aiCopy${dayIndex}`);
    btn.textContent = 'Copied!'; btn.classList.add('ai-copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ai-copied'); }, 2000);
  });
}

function toggleTask(item, dayIndex, taskIndex) {
  item.classList.toggle('done');
  const items = document.querySelectorAll('#taskList .task-item');
  const states = [...items].map(t => t.classList.contains('done'));
  localStorage.setItem(`va_day${dayIndex}_tasks`, JSON.stringify(states));
  const doneCount = states.filter(Boolean).length;
  document.getElementById('taskCounter').textContent = `${doneCount} / ${states.length} tasks done`;
  if (doneCount === states.length) markDayComplete(dayIndex);
}

function saveJournal(dayIndex) { localStorage.setItem(`va_day${dayIndex}_journal`, document.getElementById('journalEntry').value); }

function downloadNotes(dayIndex) {
  const d = DAYS[dayIndex];
  const tasks = [...document.querySelectorAll('#taskList .task-item')].map(t => `${t.classList.contains('done')?'[x]':'[ ]'} ${t.querySelector('.task-text').textContent.trim()}`).join('\n');
  const journal = document.getElementById('journalEntry').value || '(no notes written yet)';
  const content = `THE VA BLUEPRINT — Day ${dayIndex+1} Notes\n${'='.repeat(44)}\n\nDAY TITLE: ${d.title}\n\nTASKS:\n${tasks}\n\nJOURNAL PROMPT:\n${d.prompt}\n\nMY ANSWER:\n${journal}\n\nDate saved: ${new Date().toLocaleDateString()}`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type:'text/plain'}));
  a.download = `VA-Blueprint-Day${dayIndex+1}-Notes.txt`;
  a.click();
}

showHome();
</script>
